<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Guía Turístico Nicaragua - Escáner Inteligente con IA</title>
    <!-- Font Awesome 6 (Gratis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f5f2e8 0%, #e8e2d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .app-header {
            background: #1e3c2c;
            color: white;
            padding: 1.2rem 1.5rem;
            text-align: center;
        }

        .app-header h1 {
            font-size: 1.8rem;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-header h1 i {
            font-size: 2rem;
            color: #ffcc66;
        }

        .tab-bar {
            display: flex;
            background: #2b4b38;
            gap: 5px;
            padding: 0 1rem;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e0e0e0;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 1.2rem;
        }

        .tab-btn.active {
            background: #f5f2e8;
            color: #1e3c2c;
            border-bottom: 3px solid #ffb347;
        }

        .view {
            display: none;
            padding: 1.5rem;
            animation: fade 0.2s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .camera-panel {
            background: #00000010;
            border-radius: 28px;
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(4px);
            margin-bottom: 1rem;
        }

        .media-container {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, #photo-preview {
            width: 100%;
            max-height: 460px;
            object-fit: cover;
            border-radius: 20px;
            display: block;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin: 24px 0 12px;
        }

        .btn {
            background: white;
            border: none;
            padding: 12px 26px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1e3c2c;
            color: white;
            border: 1px solid #ffcd94;
        }

        .btn-primary:hover {
            background: #2f5a42;
            transform: scale(0.98);
        }

        .btn-outline {
            background: #f0ede5;
            border: 1px solid #b9aa8c;
        }

        .btn-warning {
            background: #d97706;
            color: white;
        }

        .btn-save {
            background: #2c5f2d;
            color: white;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #1e3c2c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-card {
            background: #fffef7;
            border-radius: 28px;
            padding: 1.2rem;
            margin-top: 18px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            border-left: 6px solid #ffb347;
        }

        .result-card h3 {
            margin-bottom: 12px;
            color: #2c3e2b;
        }

        #resultado-texto {
            line-height: 1.5;
            font-size: 0.98rem;
        }

        .saved-item {
            background: white;
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
            position: relative;
            border: 1px solid #e9e2d0;
            transition: 0.1s;
        }

        .saved-item span {
            font-size: 0.8rem;
            color: #7f6b4a;
            display: inline-block;
            margin-bottom: 12px;
            background: #f0ede5;
            padding: 5px 12px;
            border-radius: 40px;
        }

        .saved-item div {
            margin-top: 10px;
        }

        .btn-delete {
            position: absolute;
            top: 12px;
            right: 16px;
            background: #fee2e2;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            color: #b91c1c;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.1s;
        }

        .btn-delete:hover {
            background: #ffc9c9;
        }

        @media (max-width: 640px) {
            .app-container {
                border-radius: 1.5rem;
            }
            .button-group .btn {
                padding: 10px 18px;
                font-size: 0.85rem;
            }
            .tab-btn {
                font-size: 0.9rem;
                padding: 0.8rem 0;
            }
            .view {
                padding: 1rem;
            }
            h1 {
                font-size: 1.4rem;
            }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #6b5a44;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <h1><i class="fas fa-landmark"></i> Nicaragua Mística <i class="fas fa-camera-retro"></i></h1>
        <p style="font-size: 0.85rem; margin-top: 6px;">Escanea, descubre historia y guarda tu legado</p>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-scanner-btn"><i class="fas fa-camera"></i> Escáner IA</button>
        <button class="tab-btn" id="tab-history-btn"><i class="fas fa-archive"></i> Mi Álbum</button>
    </div>

    <!-- VISTA ESCÁNER -->
    <div id="view-scanner" class="view active">
        <div class="camera-panel">
            <div class="media-container">
                <video id="camera-feed" autoplay playsinline muted></video>
                <img id="photo-preview" style="display: none;" alt="Vista previa">
            </div>
            <canvas id="capture-canvas" style="display: none;"></canvas>

            <div class="button-group">
                <button id="btn-capture" class="btn btn-primary"><i class="fas fa-camera"></i> Capturar</button>
                <label id="label-upload" class="btn btn-outline" style="cursor: pointer;"><i class="fas fa-image"></i> Galería
                    <input type="file" id="file-upload" accept="image/jpeg,image/png,image/jpg" style="display: none;">
                </label>
                <button id="btn-retake" class="btn btn-warning" style="display: none;"><i class="fas fa-rotate-left"></i> Reintentar</button>
                <button id="btn-save-current" class="btn btn-save" style="display: none;"><i class="fas fa-save"></i> Guardar lugar</button>
            </div>
        </div>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="color:#4a5b3c;">Analizando con IA Nicaragüense (Gemini 1.5 Flash)...</p>
        </div>
        <div id="resultado-container" class="result-card" style="display: none;">
            <h3><i class="fas fa-clipboard-list"></i> Resultado del análisis</h3>
            <div id="resultado-texto"></div>
        </div>
    </div>

    <!-- VISTA HISTORIAL (GUARDADOS) -->
    <div id="view-history" class="view">
        <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 1rem;">
            <h3><i class="fas fa-map-marked-alt"></i> Lugares descubiertos</h3>
            <button id="clear-all-history" class="btn-outline btn" style="padding: 6px 14px; font-size: 0.8rem;"><i class="fas fa-trash-alt"></i> Borrar todo</button>
        </div>
        <div id="saved-list" style="max-height: 65vh; overflow-y: auto; padding-right: 5px;"></div>
        <p style="text-align:center; margin-top: 20px; font-size:0.8rem; color:#6f5b40;"><i class="fas fa-info-circle"></i> Cada ficha contiene el análisis histórico generado por IA.</p>
    </div>
    <footer>🇳🇮 Inteligencia geohistórica • Volcanes, lagos y tradición</footer>
</div>

<script>
    // ======================= CONFIGURACIÓN API KEY Y ENDPOINT CORRECTO (GEMINI 1.5 FLASH) =======================
    const API_KEY = "AIzaSyDZESzTAhwhRNgPN5pxL84nmL73zeOKxv0";
    // Usamos la versión v1beta que soporta el modelo gemini-1.5-flash con visión
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    // Elementos DOM
    const video = document.getElementById('camera-feed');
    const preview = document.getElementById('photo-preview');
    const canvas = document.getElementById('capture-canvas');
    const fileUpload = document.getElementById('file-upload');
    const btnCapture = document.getElementById('btn-capture');
    const labelUpload = document.getElementById('label-upload');
    const btnRetake = document.getElementById('btn-retake');
    const btnSaveCurrent = document.getElementById('btn-save-current');
    const loader = document.getElementById('loader');
    const resultContainer = document.getElementById('resultado-container');
    const resultText = document.getElementById('resultado-texto');
    const savedListDiv = document.getElementById('saved-list');
    
    let streamVideo = null;
    let userCoords = "Ubicación no proporcionada (GPS desactivado)";
    let currentScanResult = null;
    let isProcessing = false;

    // ======================= COMPRESIÓN INTELIGENTE DE IMAGEN (evita límite de 4MB) =======================
    async function resizeBase64Image(base64Str, maxWidth = 1024, maxHeight = 1024) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                if (width > maxWidth || height > maxHeight) {
                    const ratio = Math.min(maxWidth / width, maxHeight / height);
                    width = Math.floor(width * ratio);
                    height = Math.floor(height * ratio);
                }
                const resizeCanvas = document.createElement('canvas');
                resizeCanvas.width = width;
                resizeCanvas.height = height;
                const ctx = resizeCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const resized = resizeCanvas.toDataURL('image/jpeg', 0.85);
                resolve(resized.split(',')[1]);
            };
            img.onerror = () => {
                // Si falla, devolvemos el base64 sin comprimir (pero eliminando cabecera)
                let clean = base64Str.split(',')[1] || base64Str;
                resolve(clean);
            };
            img.src = base64Str;
        });
    }

    // ======================= CAMBIAR VISTAS =======================
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        
        if(viewId === 'view-scanner') {
            document.getElementById('tab-scanner-btn').classList.add('active');
            document.getElementById('tab-history-btn').classList.remove('active');
            startCamera();
            obtenerUbicacion();
            resetScannerUI();
        } else {
            document.getElementById('tab-history-btn').classList.add('active');
            document.getElementById('tab-scanner-btn').classList.remove('active');
            stopCamera();
            loadSavedPlaces();
        }
    }

    // ======================= GEOLOCALIZACIÓN =======================
    function obtenerUbicacion() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userCoords = `Lat: ${pos.coords.latitude.toFixed(5)}, Lon: ${pos.coords.longitude.toFixed(5)}`;
                    console.log("Ubicación obtenida:", userCoords);
                },
                (err) => {
                    console.warn("GPS denegado:", err.message);
                    userCoords = "Ubicación no disponible (permiso denegado)";
                }
            );
        } else {
            userCoords = "Geolocalización no soportada";
        }
    }

    // ======================= CÁMARA =======================
    async function startCamera() {
        if (streamVideo) stopCamera();
        try {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            streamVideo = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = streamVideo;
            video.style.display = "block";
            preview.style.display = "none";
            await video.play();
        } catch (err) {
            console.error("Error cámara:", err);
            btnCapture.style.display = "none";
            labelUpload.style.display = "block";
            alert("No se pudo acceder a la cámara. Puedes subir imágenes desde tu galería.");
        }
    }

    function stopCamera() {
        if (streamVideo) {
            streamVideo.getTracks().forEach(track => track.stop());
            streamVideo = null;
            video.srcObject = null;
        }
    }

    function resetScannerUI() {
        video.style.display = "block";
        preview.style.display = "none";
        btnCapture.style.display = "block";
        labelUpload.style.display = "block";
        btnRetake.style.display = "none";
        btnSaveCurrent.style.display = "none";
        resultContainer.style.display = "none";
        if(fileUpload) fileUpload.value = "";
        currentScanResult = null;
        isProcessing = false;
    }

    // ======================= CAPTURAR DESDE VIDEO O ARCHIVO =======================
    btnCapture.addEventListener('click', () => {
        if (isProcessing) return;
        if (!video.videoWidth || video.videoWidth === 0) {
            alert("Espera que la cámara se estabilice.");
            return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        processCapturedImage(dataUrl);
    });

    fileUpload.addEventListener('change', (e) => {
        if (isProcessing) return;
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
            processCapturedImage(evt.target.result);
        };
        reader.readAsDataURL(file);
    });

    // ======================= PROCESAR Y ENVIAR A GEMINI =======================
    async function processCapturedImage(dataUrl) {
        if (isProcessing) return;
        isProcessing = true;
        // Detener cámara y mostrar preview
        stopCamera();
        preview.src = dataUrl;
        video.style.display = "none";
        preview.style.display = "block";
        btnCapture.style.display = "none";
        labelUpload.style.display = "none";
        btnRetake.style.display = "block";
        btnSaveCurrent.style.display = "none";
        resultContainer.style.display = "none";
        
        loader.style.display = "block";
        try {
            // Comprimir imagen para evitar errores de tamaño
            const compressedBase64 = await resizeBase64Image(dataUrl, 1024, 1024);
            await enviarAGemini(compressedBase64);
        } catch (err) {
            console.error(err);
            resultText.innerHTML = `<p><strong>⚠️ Error interno:</strong> ${err.message || "No se pudo procesar la imagen"}</p>`;
            resultContainer.style.display = "block";
        } finally {
            loader.style.display = "none";
            isProcessing = false;
        }
    }

    async function enviarAGemini(base64Image) {
        const prompt = `Eres un historiador experto y guía turístico de Nicaragua.
        Analiza esta foto. Las coordenadas de geolocalización aproximadas del usuario son: ${userCoords}.
        Cruza la información visual con el GPS de forma estricta para determinar con precisión lagos, ríos, volcanes o monumentos nicaragüenses específicos (ejemplo: volcán Masaya, Cerro Negro, Río San Juan, Laguna de Apoyo, etc.).
        Si la imagen NO pertenece a Nicaragua o no es reconocible, indícalo claramente de forma amable.
        
        Responde EXCLUSIVAMENTE en formato HTML estructurado (usando <p>, <strong>, <em>) con los siguientes puntos fijos:
        - <strong>¿Es de Nicaragua?</strong>: (Sí / No / Probablemente)
        - <strong>Elemento detectado</strong>: (Nombre oficial del lugar, volcán, lago, ciudad, etc.)
        - <strong>Ubicación</strong>: (Departamento o región de Nicaragua, si aplica)
        - <strong>Historia y Descripción</strong>: (Explicación rica sobre su contexto histórico o valor turístico, mínimo 50 palabras).
        
        Si no pertenece a Nicaragua, explica el motivo visual o geográfico.
        NO uses markdown, solo HTML básico.`;

        const requestBody = {
            contents: [
                {
                    parts: [
                        { text: prompt },
                        {
                            inlineData: {
                                mimeType: "image/jpeg",
                                data: base64Image
                            }
                        }
                    ]
                }
            ],
            generationConfig: {
                temperature: 0.4,
                topP: 0.9,
                maxOutputTokens: 1000
            }
        };

        try {
            const response = await fetch(GEMINI_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                let errorDetail = await response.text();
                let mensaje = `Error ${response.status}: `;
                try {
                    const errJson = JSON.parse(errorDetail);
                    mensaje += errJson.error?.message || errorDetail;
                } catch(e) {
                    mensaje += errorDetail.substring(0, 150);
                }
                throw new Error(mensaje);
            }

            const data = await response.json();
            if (!data.candidates || data.candidates.length === 0 || !data.candidates[0].content) {
                throw new Error("La IA no devolvió una respuesta válida.");
            }
            const textoRespuesta = data.candidates[0].content.parts[0].text;
            resultText.innerHTML = textoRespuesta;
            resultContainer.style.display = "block";

            // Guardar escaneo actual para posible guardado
            currentScanResult = {
                id: Date.now(),
                fecha: new Date().toLocaleString('es-NI', { dateStyle: 'medium', timeStyle: 'short' }),
                htmlContent: textoRespuesta
            };
            btnSaveCurrent.style.display = "block";
        } catch (error) {
            console.error("Gemini error:", error);
            resultText.innerHTML = `<p><strong>❌ Error de conexión con IA:</strong> ${error.message}. Verifica tu conexión a internet o que la API Key sea válida.</p>`;
            resultContainer.style.display = "block";
            btnSaveCurrent.style.display = "none";
        }
    }

    // ======================= GUARDAR EN LOCALSTORAGE =======================
    btnSaveCurrent.addEventListener('click', () => {
        if (!currentScanResult) {
            alert("No hay ningún resultado reciente para guardar.");
            return;
        }
        let saved = JSON.parse(localStorage.getItem('nicaragua_places')) || [];
        if (!saved.some(item => item.id === currentScanResult.id)) {
            saved.push(currentScanResult);
            localStorage.setItem('nicaragua_places', JSON.stringify(saved));
            alert("✅ ¡Guardado en tu álbum personal!");
        } else {
            alert("Este lugar ya se encuentra en tu historial.");
        }
        btnSaveCurrent.style.display = "none";
    });

    function loadSavedPlaces() {
        if (!savedListDiv) return;
        let saved = JSON.parse(localStorage.getItem('nicaragua_places')) || [];
        if (saved.length === 0) {
            savedListDiv.innerHTML = `<div style="text-align:center; padding: 2rem; background: #fef8e7; border-radius: 2rem;"><i class="fas fa-leaf"></i> <p>Aún no has guardado ningún sitio. Escanea lugares de Nicaragua y guárdalos aquí.</p></div>`;
            return;
        }
        savedListDiv.innerHTML = "";
        // Mostrar más recientes primero
        [...saved].reverse().forEach(item => {
            const card = document.createElement('div');
            card.className = "saved-item";
            card.innerHTML = `
                <span><i class="far fa-calendar-alt"></i> ${item.fecha}</span>
                <button class="btn-delete" data-id="${item.id}"><i class="fas fa-trash-can"></i> Eliminar</button>
                <div>${item.htmlContent}</div>
            `;
            savedListDiv.appendChild(card);
        });
        // Asignar eventos a los botones de eliminar
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deletePlaceById(id);
            });
        });
    }

    function deletePlaceById(id) {
        let saved = JSON.parse(localStorage.getItem('nicaragua_places')) || [];
        const newList = saved.filter(item => item.id !== id);
        if (newList.length === saved.length) return;
        localStorage.setItem('nicaragua_places', JSON.stringify(newList));
        loadSavedPlaces();
    }

    document.getElementById('clear-all-history')?.addEventListener('click', () => {
        if (confirm("¿Borrar TODOS los lugares guardados? Esta acción es irreversible.")) {
            localStorage.removeItem('nicaragua_places');
            loadSavedPlaces();
        }
    });

    // ======================= REINTENTAR =======================
    btnRetake.addEventListener('click', () => {
        resetScannerUI();
        startCamera();
        obtenerUbicacion();
        resultContainer.style.display = "none";
        currentScanResult = null;
    });

    // ======================= NAVEGACIÓN =======================
    document.getElementById('tab-scanner-btn').addEventListener('click', () => switchView('view-scanner'));
    document.getElementById('tab-history-btn').addEventListener('click', () => switchView('view-history'));

    // ======================= INICIALIZACIÓN =======================
    (function init() {
        resetScannerUI();
        startCamera();
        obtenerUbicacion();
        loadSavedPlaces();
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            btnCapture.style.display = "none";
            labelUpload.style.display = "block";
            console.warn("getUserMedia no soportada");
        }
    })();
</script>
</body>
</html>
